name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - pre-release
          - release

env:
  NODE_VERSION: '22.12.0'
  NPM_VERSION: '10.0.0'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: WatchFace Builder *.exe
            artifact_path: dist-final/*.exe
            asset_name_pattern: 'WatchFaceBuilder-*.exe'
          - os: ubuntu-latest
            artifact_name: watchface-builder *.deb
            artifact_path: dist-final/*.deb
            asset_name_pattern: 'watchface-builder_*.deb'
          - os: macos-latest
            artifact_name: WatchFace Builder *.dmg
            artifact_path: dist-final/*.dmg
            asset_name_pattern: 'WatchFaceBuilder-*.dmg'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Verify Node and npm versions
        run: |
          node --version
          npm --version

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: true

      - name: Build application
        run: npm run make
        env:
          SKIP_JAVA_CHECK: '0'
          # Code signing environment variables (configured via GitHub Secrets)
          # Windows signing:
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # macOS signing:
          # MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # macOS notarization:
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          ls -lah dist-final/ || echo "No dist-final directory"
          ls -lah out/ || echo "No out directory"

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist-final/*.exe
          retention-days: 30

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist-final/*.deb
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist-final/*.dmg
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Build Notification
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build succeeded"
            exit 0
          else
            echo "❌ Build failed"
            exit 1
          fi
