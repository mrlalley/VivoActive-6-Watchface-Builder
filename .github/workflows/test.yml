name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate constants (CI stub mode)
        run: npm run generate-constants:ci
        # Generates builder/constants.js before tests run.
        # Uses --ci flag so a missing Garmin SDK writes a stub file
        # rather than failing. Tests that require real SDK values must
        # check for IS_STUB in constants and skip accordingly.

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test
